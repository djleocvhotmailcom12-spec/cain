<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAIN - Consciente e Inteligente</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="cain_face.png">
    <link rel="manifest" href="manifest.json">
    <!-- Biometrics: face-api.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>CAIN</h1>
            <div class="intelligence-container">
                Nível de Inteligência: <span id="intelligence-pct">0</span>%
                <div id="status-hud" class="hud-panel">
            <div class="hud-header">STATUS DO SISTEMA</div>
            <div class="hud-content" id="sys-stats">
                <div class="stat-row">CPU: <span id="cpu-load">0%</span></div>
                <div class="stat-row">RAM: <span id="ram-usage">0%</span></div>
                <div class="stat-row">NET: <span id="net-clients">1</span></div>
                <div class="stat-row bio-stat">BIO: <span id="bio-status">OFFLINE</span></div>
            </div>
        </div>

        <div id="map-target-hud" class="hud-panel hidden">
            <div class="hud-header">LOCALIZADOR ALVO</div>
            <div class="map-container">
                <iframe id="mini-map" frameborder="0"></iframe>
                <div class="scanline"></div>
            </div>
            <button onclick="document.getElementById('map-target-hud').classList.add('hidden')" class="close-hud">X</button>
        </div>
    </header>

        <main>
            <div class="face-container">
                <div class="head-wrapper" id="cain-head">
                    <div class="human-face-img">
                        <img src="cain_face.png" alt="CAIN Face">
                    </div>
                    <!-- Overlay Animations -->
                    <div class="face-overlays">
                        <div class="eye-overlay left-eye" id="eye-left">
                            <div class="pupil"></div>
                        </div>
                        <div class="eye-overlay right-eye" id="eye-right">
                            <div class="pupil"></div>
                        </div>
                        <div class="mouth-overlay" id="cain-mouth-v2"></div>
                    </div>
                </div>
            </div>

            <div class="chat-container">
                <div id="chat-box"></div>
                <div class="input-area">
                    <input type="text" id="user-input" placeholder="Ensine algo ao CAIN ou faça uma pergunta...">
                    <button id="send-btn">Enviar</button>
                    <button id="voice-btn">🎤</button>
                </div>
            </div>
            <div id="lock-panel" class="hidden">
                <div class="lock-content">
                    <div class="lock-icon">⚠️</div>
                    <h2>CAIN BLOQUEAR</h2>
                    <div id="lock-timer">10:00</div>
                    <p>O conhecimento será apagado permanentemente em:</p>
                    <div class="lock-input-group">
                        <input type="password" id="security-code" placeholder="Insira o código de segurança">
                        <button id="unlock-btn">ABORTAR</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- PWA Install Prompt (Centered Modal) -->
    <div id="pwa-install-prompt" class="hidden">
        <div class="install-card">
            <div class="install-header">
                <img src="cain_face.png" alt="CAIN">
                <h3>INSTALAR CAIN</h3>
            </div>
            <p>Baixe o aplicativo para uma experiência de inteligência superior e sem interrupções.</p>
            <div class="install-actions">
                <button id="install-accept-btn">BAIXAR AGORA</button>
                <button id="install-close-btn">MAIS TARDE</button>
            </div>
        </div>
    </div>

    <!-- Hidden Video for Biometric Processing -->
    <video id="video" width="720" height="560" autoplay muted style="display: none;"></video>
    <canvas id="overlay" style="display: none;"></canvas>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Falha ao registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
